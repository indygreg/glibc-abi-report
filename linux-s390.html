<html>

<head>
  <meta charset="UTF-8" />
  <style>
      tr, th, td {
    border: 1px solid black;
}

td.deleted {
    color: red;
    font-weight: bold;
}

td.empty {
    border: 0;
}

tr.hidden {
    display: none;
}
  </style>
  <script>
    function omnipresentChanged(cb) {
    const els = document.getElementsByClassName("omnipresent");
    const add = cb.checked;
    for (let i = 0; i < els.length; i++) {
        if (add) {
            els[i].classList.add("hidden");
        } else {
            els[i].classList.remove("hidden");
        }
    }
}

function archVersionsOnLoad() {
    const checkboxes = document.querySelectorAll('input[type="checkbox"]');
    checkboxes.forEach(cb => cb.checked = false);
}

    
    window.onload = archVersionsOnLoad;
    
  </script>
</head>
<body>
  <h1>Glibc Symbol Report for linux-s390</h1>
  <div>
    <span>
      <input id="omnipresent" type="checkbox" onchange="omnipresentChanged(this)">
      <label for="omnipresent">Hide Omnipresent</label>
    </span>
  </div>
  <table>
    <tr>
      <th>Library</th>
      <th>Symbol</th>
      <th>2.20</th>
      <th>2.21</th>
      <th>2.22</th>
      <th>2.23</th>
      <th>2.24</th>
      <th>2.25</th>
      <th>2.26</th>
      <th>2.27</th>
      <th>2.28</th>
      <th>2.29</th>
      <th>2.30</th>
      <th>2.31</th>
      <th>2.32</th>
      <th>2.33</th>
      
    </tr>
    <tr class="omnipresent">
      <td>libanl</td>
      <td>gai_cancel</td>
      <td colspan="14">2.2.3</td>
    </tr>
    <tr class="omnipresent">
      <td>libanl</td>
      <td>gai_error</td>
      <td colspan="14">2.2.3</td>
    </tr>
    <tr class="omnipresent">
      <td>libanl</td>
      <td>gai_suspend</td>
      <td colspan="14">2.2.3</td>
    </tr>
    <tr class="omnipresent">
      <td>libanl</td>
      <td>getaddrinfo_a</td>
      <td colspan="14">2.2.3</td>
    </tr>
    
  </table>
</body>
</html>
