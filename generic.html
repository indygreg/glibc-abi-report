<html>

<head>
  <meta charset="UTF-8" />
  <style>
      tr, th, td {
    border: 1px solid black;
}

td.deleted {
    color: red;
    font-weight: bold;
}

td.empty {
    border: 0;
}

tr.hidden {
    display: none;
}
  </style>
  <script>
    function omnipresentChanged(cb) {
    const els = document.getElementsByClassName("omnipresent");
    const add = cb.checked;
    for (let i = 0; i < els.length; i++) {
        if (add) {
            els[i].classList.add("hidden");
        } else {
            els[i].classList.remove("hidden");
        }
    }
}

function archVersionsOnLoad() {
    const checkboxes = document.querySelectorAll('input[type="checkbox"]');
    checkboxes.forEach(cb => cb.checked = false);
}

    
    window.onload = archVersionsOnLoad;
    
  </script>
</head>
<body>
  <h1>Glibc Symbol Report for generic</h1>
  <div>
    <span>
      <input id="omnipresent" type="checkbox" onchange="omnipresentChanged(this)">
      <label for="omnipresent">Hide Omnipresent</label>
    </span>
  </div>
  <table>
    <tr>
      <th>Library</th>
      <th>Symbol</th>
      <th>2.32</th>
      <th>2.33</th>
      <th>2.36</th>
      <th>2.37</th>
      <th>2.38</th>
      <th>2.39</th>
      <th>2.40</th>
      <th>2.41</th>
      <th>2.42</th>
      <th>2.43</th>
      
    </tr>
    <tr class="deletion">
      <td>libc</td>
      <td>__libc_single_threaded</td>
      <td colspan="2">2.32</td>
      <td class="deleted">x</td>
      <td colspan="7" class="empty"></td>
    </tr>
    <tr>
      <td>libc</td>
      <td>pidfd_getfd</td>
      <td colspan="2" class="empty"></td>
      <td colspan="8">2.36</td>
    </tr>
    
  </table>
</body>
</html>
